<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jual Barang - Preloved</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="form-card">
            <h1 class="form-title">Mulai Berjualan</h1>
            
            <form action="#">
                <div class="form-group">
                    <label class="label">Foto Produk</label>
                    <div class="upload-area" onclick="document.getElementById('file-input').click()">
                        <div id="foto-display" class="upload-icon">📸</div>
                        <p class="upload-text">Klik untuk unggah foto pakaian/aksesoris</p>
                        <input type="file" id="file-input" hidden multiple accept="image/*">
                    </div>
                </div>

                <div class="form-group">
                    <label for="name" class="label">Nama Barang</label>
                    <input type="text" id="name" class="input" placeholder="Contoh: Jaket Denim Levi's Size L">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="category" class="label">Kategori</label>
                        <select id="category" class="input">
                            <option>Pakaian</option>
                            <option>Aksesoris</option>
                            <option>Tas</option>
                            <option>Sepatu</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="condition" class="label">Kondisi</label>
                        <select id="condition" class="input">
                            <option>Baru</option>
                            <option>Bekas - Seperti Baru</option>
                            <option>Bekas - Baik</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="desc" class="label">Deskripsi</label>
                    <textarea id="desc" class="input" rows="4" placeholder="Ceritakan detail barangmu..."></textarea>
                </div>

                <div class="form-group">
                    <label for="price" class="label">Harga</label>
                    <div class="price-container">
                        <span class="currency">Rp</span>
                        <input type="number" id="price" class="input-price" placeholder="0">
                    </div>
                </div>

                <button type="submit" class="btn-submit">Pasang Iklan</button>
            </form>
        </div>
    </div>

</body>
</html>
